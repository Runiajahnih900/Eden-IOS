name: iOS Bootstrap CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "externals/**"
      - "src/**"
      - "docs/IOS_PORTING_LOG.md"
      - ".github/workflows/ios-bootstrap.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "CMakeLists.txt"
      - "externals/**"
      - "src/**"
      - "docs/IOS_PORTING_LOG.md"
      - ".github/workflows/ios-bootstrap.yml"

jobs:
  ios-bootstrap:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show tool versions
        run: |
          cmake --version
          xcodebuild -version
          clang --version

      - name: Install glslangValidator
        run: |
          brew list glslang >/dev/null 2>&1 || brew install glslang
          glslangValidator --version

      - name: Install ccache
        run: |
          brew list ccache >/dev/null 2>&1 || brew install ccache
          ccache --version

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ${{ runner.os }}-ios-bootstrap-ccache-${{ github.ref_name }}-${{ hashFiles('CMakeLists.txt', 'src/**', 'externals/**', '.github/workflows/ios-bootstrap.yml') }}
          restore-keys: |
            ${{ runner.os }}-ios-bootstrap-ccache-${{ github.ref_name }}-
            ${{ runner.os }}-ios-bootstrap-ccache-

      - name: Initialize ccache stats
        run: |
          ccache --zero-stats
          ccache --max-size=2G
          ccache --show-config

      - name: Configure iOS app (iphoneos)
        run: |
          mkdir -p build-ios
          set -o pipefail
          cmake -S . -B build-ios \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJC_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJCXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MESSAGE_LOG_LEVEL=VERBOSE \
            -DENABLE_IOS_BOOTSTRAP=ON \
            -DIOS_APP_LINK_BOOTSTRAP=ON \
            -DYUZU_USE_BUNDLED_FFMPEG=ON \
            -DYUZU_USE_EXTERNAL_FFMPEG=OFF \
            -DBOOST_CONTEXT_ARCHITECTURE=arm64 \
            -DBOOST_CONTEXT_ABI=aapcs \
            -DBOOST_CONTEXT_BINARY_FORMAT=mach-o \
            -DBOOST_CONTEXT_ASSEMBLER=gas \
            -DBOOST_CONTEXT_ASM_SUFFIX=.S \
            -DENABLE_QT=OFF \
            -DYUZU_CMD=OFF \
            -DYUZU_ROOM=OFF \
            -DYUZU_ROOM_STANDALONE=OFF \
            2>&1 | tee build-ios/configure.log

      - name: Build iOS app target
        run: |
          set -o pipefail
          cmake --build build-ios --target eden-ios-app --parallel --verbose 2>&1 | tee build-ios/build.log

      - name: Show ccache stats
        if: always()
        run: ccache --show-stats

      - name: Package unsigned IPA
        run: |
          APP_PATH="$(find build-ios -type d -name 'EdenIOS.app' -print -quit)"
          if [ -z "$APP_PATH" ]; then
            echo "Could not find EdenIOS.app in build output"
            exit 1
          fi

          rm -rf build-ios/ipa
          mkdir -p build-ios/ipa/Payload
          cp -R "$APP_PATH" build-ios/ipa/Payload/

          (cd build-ios/ipa && /usr/bin/zip -qry ../eden-ios-unsigned.ipa Payload)
          ls -lh build-ios/eden-ios-unsigned.ipa

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          set +e

          first_config_error=""
          first_build_error=""

          {
            echo "## iOS Bootstrap Failure Summary"
            echo
            echo "Ringkasan singkat error (detail lengkap ada di artifact ios-bootstrap-diagnostics)."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::group::CPM options snapshot"
          grep -nE "httplib|openssl" externals/cpmfile.json || true
          echo "::endgroup::"

          echo "::group::CMake cache (filtered)"
          if [ -f build-ios/CMakeCache.txt ]; then
            grep -E "OPENSSL|HTTPLIB|PLATFORM_IOS|ENABLE_IOS_BOOTSTRAP|CMAKE_SYSTEM_NAME|CMAKE_SYSTEM_PROCESSOR|CMAKE_OSX|BOOST_CONTEXT" build-ios/CMakeCache.txt || true
            {
              echo "### Cache filter"
              echo '```text'
              grep -E "OPENSSL|HTTPLIB|PLATFORM_IOS|ENABLE_IOS_BOOTSTRAP|CMAKE_SYSTEM_NAME|CMAKE_SYSTEM_PROCESSOR|CMAKE_OSX|BOOST_CONTEXT" build-ios/CMakeCache.txt | head -n 100 || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/CMakeCache.txt not found"
          fi
          echo "::endgroup::"

          echo "::group::CMakeError.log tail"
          if [ -f build-ios/CMakeFiles/CMakeError.log ]; then
            tail -n 120 build-ios/CMakeFiles/CMakeError.log || true
            {
              echo "### CMakeError.log tail"
              echo '```text'
              tail -n 120 build-ios/CMakeFiles/CMakeError.log || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/CMakeFiles/CMakeError.log not found"
          fi
          echo "::endgroup::"

          echo "::group::Configure hard errors (short)"
          if [ -f build-ios/configure.log ]; then
            grep -nE "CMake Error at|Could NOT find|Configuring incomplete, errors occurred" build-ios/configure.log | tail -n 80 || true
            first_config_error=$(grep -nE "CMake Error at|Could NOT find|Configuring incomplete, errors occurred" build-ios/configure.log | head -n 1 || true)
            {
              echo "### Configure hard errors"
              echo '```text'
              grep -nE "CMake Error at|Could NOT find|Configuring incomplete, errors occurred" build-ios/configure.log | tail -n 80 || true
              echo '```'
              echo
              echo "### Root cause snippet"
              echo '```text'
              awk '
                /CMake Error at|Could NOT find/ {capture=1;left=14}
                capture && left>0 {print; left--; if (left==0) capture=0}
              ' build-ios/configure.log | head -n 120 || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/configure.log not found"
          fi
          echo "::endgroup::"

          echo "::group::Build hard errors (short)"
          if [ -f build-ios/build.log ]; then
            grep -nEi "Undefined symbols for architecture|symbol\(s\) not found|framework not found|library not found|duplicate symbol|error:|fatal error:|undefined reference|ld: error|ninja: build stopped|subcommand failed" build-ios/build.log | tail -n 120 || true
            first_build_error=$(grep -nEi "Undefined symbols for architecture|symbol\(s\) not found|framework not found|library not found|duplicate symbol|undefined reference|ld: error|fatal error:|error:" build-ios/build.log | head -n 1 || true)
            {
              echo "### Build hard errors"
              echo '```text'
              grep -nEi "Undefined symbols for architecture|symbol\(s\) not found|framework not found|library not found|duplicate symbol|error:|fatal error:|undefined reference|ld: error|ninja: build stopped|subcommand failed" build-ios/build.log | tail -n 120 || true
              echo '```'
              echo
              echo "### Build root cause snippet"
              echo '```text'
              awk '
                /Undefined symbols for architecture|symbol\(s\) not found|framework not found|library not found|duplicate symbol|fatal error:|error:|undefined reference|ld: error/ {capture=1;left=20}
                capture && left>0 {print; left--; if (left==0) capture=0}
              ' build-ios/build.log | head -n 140 || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/build.log not found"
          fi
          echo "::endgroup::"

          if [ -n "$first_config_error" ]; then
            echo "::error title=Configure failure::$first_config_error"
          fi
          if [ -n "$first_build_error" ]; then
            echo "::error title=Build failure::$first_build_error"
          fi

          if [ -f build-ios/build.log ]; then
            linker_snippet=$(awk '
              /Undefined symbols for architecture/ {capture=1;left=12}
              capture && left>0 {print; left--; if (left==0) capture=0}
            ' build-ios/build.log | tr '\n' '|' | sed 's/|$//')
            if [ -n "$linker_snippet" ]; then
              echo "::error title=Linker symbols::$linker_snippet"
            fi

            first_linker_line=$(grep -nE "Undefined symbols for architecture|symbol\(s\) not found|ld: error|clang: error: linker command failed" build-ios/build.log | head -n 1 | cut -d: -f1 || true)
            if [ -n "$first_linker_line" ]; then
              start_line=$((first_linker_line-40))
              if [ "$start_line" -lt 1 ]; then
                start_line=1
              fi
              end_line=$((first_linker_line+25))
              linker_context=$(sed -n "${start_line},${end_line}p" build-ios/build.log | tr '\n' '|' | sed 's/|$//' | cut -c1-7000)
              if [ -n "$linker_context" ]; then
                echo "::error title=Linker context::$linker_context"
              fi

              {
                echo "### Linker context"
                echo '```text'
                sed -n "${start_line},${end_line}p" build-ios/build.log || true
                echo '```'
                echo
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

          echo "::group::Reconfigure with --debug-find"
          mkdir -p build-ios-debug
          cmake -S . -B build-ios-debug \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJC_COMPILER_LAUNCHER=ccache \
            -DCMAKE_OBJCXX_COMPILER_LAUNCHER=ccache \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_SYSTEM_PROCESSOR=arm64 \
            -DCMAKE_OSX_SYSROOT=iphoneos \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_ALLOWED=NO \
            -DCMAKE_XCODE_ATTRIBUTE_CODE_SIGNING_REQUIRED=NO \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MESSAGE_LOG_LEVEL=VERBOSE \
            -DENABLE_IOS_BOOTSTRAP=ON \
            -DIOS_APP_LINK_BOOTSTRAP=ON \
            -DYUZU_USE_BUNDLED_FFMPEG=ON \
            -DYUZU_USE_EXTERNAL_FFMPEG=OFF \
            -DBOOST_CONTEXT_ARCHITECTURE=arm64 \
            -DBOOST_CONTEXT_ABI=aapcs \
            -DBOOST_CONTEXT_BINARY_FORMAT=mach-o \
            -DBOOST_CONTEXT_ASSEMBLER=gas \
            -DBOOST_CONTEXT_ASM_SUFFIX=.S \
            -DENABLE_QT=OFF \
            -DYUZU_CMD=OFF \
            -DYUZU_ROOM=OFF \
            -DYUZU_ROOM_STANDALONE=OFF \
            --debug-find > build-ios-debug/configure-debug-find.log 2>&1 || true
          echo "Saved full --debug-find log to build-ios-debug/configure-debug-find.log"
          {
            echo "### debug-find note"
            echo "Full debug-find output is stored in artifact file: build-ios-debug/configure-debug-find.log"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Upload IPA artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: eden-ios-ipa
          if-no-files-found: error
          path: build-ios/eden-ios-unsigned.ipa

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-bootstrap-diagnostics
          if-no-files-found: ignore
          path: |
            build-ios/CMakeCache.txt
            build-ios/configure.log
            build-ios/build.log
            build-ios/CMakeFiles/CMakeConfigureLog.yaml
            build-ios/CMakeFiles/CMakeOutput.log
            build-ios/CMakeFiles/CMakeError.log
            build-ios/eden-ios-unsigned.ipa
            build-ios-debug/CMakeCache.txt
            build-ios-debug/configure-debug-find.log
