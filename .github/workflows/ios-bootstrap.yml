name: iOS Bootstrap CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "CMakeLists.txt"
      - "externals/**"
      - "src/**"
      - "docs/IOS_PORTING_LOG.md"
      - ".github/workflows/ios-bootstrap.yml"
  push:
    branches:
      - main
      - master
    paths:
      - "CMakeLists.txt"
      - "externals/**"
      - "src/**"
      - "docs/IOS_PORTING_LOG.md"
      - ".github/workflows/ios-bootstrap.yml"

jobs:
  ios-bootstrap:
    runs-on: macos-14
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Show tool versions
        run: |
          cmake --version
          xcodebuild -version
          clang --version

      - name: Configure iOS bootstrap (simulator)
        run: |
          cmake -S . -B build-ios \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MESSAGE_LOG_LEVEL=VERBOSE \
            -DENABLE_IOS_BOOTSTRAP=ON \
            -DENABLE_QT=OFF \
            -DYUZU_CMD=OFF \
            -DYUZU_ROOM=OFF \
            -DYUZU_ROOM_STANDALONE=OFF

      - name: Build iOS bootstrap target
        run: cmake --build build-ios --target yuzu-ios-bootstrap --parallel

      - name: Dump diagnostics on failure
        if: failure()
        run: |
          set +e

          {
            echo "## iOS Bootstrap Failure Summary"
            echo
            echo "Ringkasan singkat error (detail lengkap ada di artifact ios-bootstrap-diagnostics)."
            echo
          } >> "$GITHUB_STEP_SUMMARY"

          echo "::group::CPM options snapshot"
          grep -nE "httplib|openssl" externals/cpmfile.json || true
          echo "::endgroup::"

          echo "::group::CMake cache (filtered)"
          if [ -f build-ios/CMakeCache.txt ]; then
            grep -E "OPENSSL|HTTPLIB|PLATFORM_IOS|ENABLE_IOS_BOOTSTRAP|CMAKE_SYSTEM_NAME|CMAKE_OSX" build-ios/CMakeCache.txt || true
            {
              echo "### Cache filter"
              echo '```text'
              grep -E "OPENSSL|HTTPLIB|PLATFORM_IOS|ENABLE_IOS_BOOTSTRAP|CMAKE_SYSTEM_NAME|CMAKE_OSX" build-ios/CMakeCache.txt | head -n 60 || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/CMakeCache.txt not found"
          fi
          echo "::endgroup::"

          echo "::group::CMakeError.log tail"
          if [ -f build-ios/CMakeFiles/CMakeError.log ]; then
            tail -n 120 build-ios/CMakeFiles/CMakeError.log || true
            {
              echo "### CMakeError.log tail"
              echo '```text'
              tail -n 120 build-ios/CMakeFiles/CMakeError.log || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/CMakeFiles/CMakeError.log not found"
          fi
          echo "::endgroup::"

          echo "::group::Detected error lines (short)"
          if [ -f build-ios/CMakeFiles/CMakeConfigureLog.yaml ]; then
            grep -nEi "cmake error|could not find|fatal|failed|openssl|httplib|carbon" build-ios/CMakeFiles/CMakeConfigureLog.yaml | tail -n 80 || true
            {
              echo "### ConfigureLog matched errors"
              echo '```text'
              grep -nEi "cmake error|could not find|fatal|failed|openssl|httplib|carbon" build-ios/CMakeFiles/CMakeConfigureLog.yaml | tail -n 80 || true
              echo '```'
              echo
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "build-ios/CMakeFiles/CMakeConfigureLog.yaml not found"
          fi
          echo "::endgroup::"

          echo "::group::Reconfigure with --debug-find"
          mkdir -p build-ios-debug
          cmake -S . -B build-ios-debug \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_SYSTEM_NAME=iOS \
            -DCMAKE_OSX_SYSROOT=iphonesimulator \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_TRY_COMPILE_TARGET_TYPE=STATIC_LIBRARY \
            -DCMAKE_MESSAGE_LOG_LEVEL=VERBOSE \
            -DENABLE_IOS_BOOTSTRAP=ON \
            -DENABLE_QT=OFF \
            -DYUZU_CMD=OFF \
            -DYUZU_ROOM=OFF \
            -DYUZU_ROOM_STANDALONE=OFF \
            --debug-find > build-ios-debug/configure-debug-find.log 2>&1 || true
          echo "Saved full --debug-find log to build-ios-debug/configure-debug-find.log"
          {
            echo "### debug-find note"
            echo "Full debug-find output is stored in artifact file: build-ios-debug/configure-debug-find.log"
            echo
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::endgroup::"

      - name: Upload diagnostics artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-bootstrap-diagnostics
          if-no-files-found: ignore
          path: |
            build-ios/CMakeCache.txt
            build-ios/CMakeFiles/CMakeConfigureLog.yaml
            build-ios/CMakeFiles/CMakeOutput.log
            build-ios/CMakeFiles/CMakeError.log
            build-ios-debug/CMakeCache.txt
            build-ios-debug/configure-debug-find.log
